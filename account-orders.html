<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DP Coatings — всі заявки</title>
  <meta name="description" content="Повна історія заявок і покупок в особистому кабінеті." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="redesign-shared.css" />
  <link rel="stylesheet" href="account-page.css" />
  <link rel="stylesheet" href="site-lang.css" />
</head>
<body data-page="account-orders" class="account-page">
  <script>
    (function () {
      try {
        if (!localStorage.getItem("authToken")) {
          window.location.replace("auth.html");
        }
      } catch (_) {}
    })();
  </script>

  <div class="page-bg page-bg--site">
    <div class="site-shell">
      <header class="site-header">
        <div class="container site-header-inner">
          <div class="topbar">
            <a href="index.html" class="logo" aria-label="Reaxon">
              <span class="logo-main">Rea<span class="logo-red">xon</span></span>
            </a>
            <nav class="topnav" data-ru-aria-label="Основная навигация" data-uk-aria-label="Основна навігація" aria-label="Основна навігація">
              <a href="index.html" data-i18n="navHome">Главная</a>
              <a href="products.html" data-i18n="navCatalog">Каталог</a>
              <a href="price.html" data-i18n="navPrice">Прайс</a>
              <a href="delivery.html" data-i18n="navDelivery">Доставка</a>
              <a href="contact.html" data-i18n="navContacts">Контакты</a>
            </nav>
            <div class="top-actions">
              <div class="lang-switcher" role="navigation" data-ru-aria-label="Переключение языка" data-uk-aria-label="Перемикання мови" aria-label="Перемикання мови">
                <label for="language-switcher" class="visually-hidden">
                  <span data-i18n="langLabel">Мова</span>
                </label>
                <select id="language-switcher" class="lang-switcher__select">
                  <option value="ru">RU</option>
                  <option value="uk">UA</option>
                </select>
              </div>
              <button class="icon-btn cart-btn" id="open-cart" type="button" data-i18n-aria-label="cartButton" data-ru-aria-label="Корзина" data-uk-aria-label="Кошик" aria-label="Кошик">
                🛒
                <span class="cart-badge" id="cart-count">0</span>
              </button>
              <a href="account.html" class="icon-btn header-account-trigger topbar-account-btn" data-i18n-aria-label="accountDrawerTrigger" data-ru-aria-label="Личный кабинет" data-uk-aria-label="Особистий кабінет" aria-label="Особистий кабінет">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="account-page">
        <div class="container site-content-card">
          <nav class="products-breadcrumbs" data-ru-aria-label="Навигация по разделу" data-uk-aria-label="Навігація розділом" aria-label="Навігація розділом">
            <a href="index.html" data-i18n="navHome">Главная</a>
            <span aria-hidden="true">/</span>
            <a href="account.html" data-i18n="accountDrawerTitle">Особистий кабінет</a>
            <span aria-hidden="true">/</span>
            <span data-ru="Все заявки" data-uk="Всі заявки">Всі заявки</span>
          </nav>

          <header class="account-page-hero">
            <h1 data-ru="Все заявки" data-uk="Всі заявки">Всі заявки</h1>
            <p class="account-page-lead" data-ru="Полный список заявок и состав каждой позиции." data-uk="Повний список заявок і склад кожної позиції.">
              Повний список заявок і склад кожної позиції.
            </p>
          </header>

          <section class="account-card account-card--compact account-purchase-history" aria-label="Повна історія заявок">
            <div class="account-purchase-history__actions">
              <a href="account.html" class="btn btn-ghost" data-ru="Назад в кабинет" data-uk="Назад у кабінет">Назад у кабінет</a>
            </div>
            <p id="account-orders-status" class="account-purchase-history__status" role="status" aria-live="polite"></p>
            <div id="account-orders-list" class="account-purchase-history__list"></div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="products-data.js"></script>
  <script src="api-base.js"></script>
  <script src="site-lang.js"></script>
  <script src="site-bootstrap.js"></script>
  <script src="script.js"></script>
  <script src="home-auth-ui.js"></script>
  <script src="account-orders.js"></script>
</body>
</html>
