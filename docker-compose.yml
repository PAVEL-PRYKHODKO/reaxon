# Локальный PostgreSQL для проверки перед выкладкой (Cloud SQL и т.п.).
# Запуск: npm run docker:up
# Строка подключения в .env см. .env.example

services:
  postgres:
    image: postgres:16-alpine
    container_name: dp-coatings-pg
    environment:
      POSTGRES_USER: dp
      POSTGRES_PASSWORD: dp_local_dev
      POSTGRES_DB: coatings
    ports:
      - "5432:5432"
    volumes:
      - dp_coatings_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp -d coatings"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  dp_coatings_pgdata:
